version: "3.9"
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  api:
    build: .
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - FAISS_DIR=/app/.faiss_index
      - EMBEDDINGS_MODEL=sentence-transformers/all-MiniLM-L6-v2
    volumes:
      - ./:/app
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  ollama:


